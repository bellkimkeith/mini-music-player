<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 145 145" width="145" height="145">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#082f49"/>
    </radialGradient>
  </defs>
  <circle cx="72.5" cy="72.5" r="72.5" fill="url(#bg)"/>
  <!-- snowflake 1 (center) -->
  <g transform="translate(72.5,72.5)">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="-15.5" y1="-15.5" x2="15.5" y2="15.5" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="15.5" y1="-15.5" x2="-15.5" y2="15.5" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <!-- arm tips -->
    <line x1="-5" y1="-17" x2="0" y2="-22" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="5" y1="-17" x2="0" y2="-22" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="-5" y1="17" x2="0" y2="22" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="5" y1="17" x2="0" y2="22" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>
  <!-- small snowflakes -->
  <g transform="translate(28,38)" opacity="0.6">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="white" stroke-width="1.5"/>
    <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="white" stroke-width="1.5"/>
  </g>
  <g transform="translate(115,105)" opacity="0.5">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="1.5"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- wind lines -->
  <path d="M15 90 Q40 85 60 90" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M10 100 Q45 94 70 100" fill="none" stroke="white" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</svg>
