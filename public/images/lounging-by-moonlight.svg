  <path d="M60 105 Q72.5 100 85 105" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.3"/>
  <!-- water lines -->
  <path d="M30 100 Q55 95 80 100 Q105 105 118 100" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.6"/>
