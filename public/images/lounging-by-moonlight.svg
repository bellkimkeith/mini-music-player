  <circle cx="25" cy="30" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="115" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="35" cy="55" r="1" fill="white" opacity="0.6"/>
